name: Kandilli ingestion

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger ingestion endpoint
        env:
          INGEST_URL: ${{ secrets.INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$INGEST_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing INGEST_URL or CRON_SECRET secret" >&2
            exit 1
          fi
          response=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$INGEST_URL")
          echo "HTTP $response"
          cat /tmp/body
          echo
          if [ "$response" != "200" ]; then
            exit 1
          fi

name: Kandilli ingestion

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger ingestion endpoint
        env:
          INGEST_URL: https://kandilli.vercel.app/api/cron/ingest
          KANDILLI_SECRET: ${{ secrets.KANDILLI_SECRET }}
        run: |
          if [ -z "$KANDILLI_SECRET" ]; then
            echo "Missing KANDILLI_SECRET secret" >&2
            exit 1
          fi
          # Strip any whitespace/newlines that may have been copy-pasted in.
          KANDILLI_SECRET=$(printf '%s' "$KANDILLI_SECRET" | tr -d '[:space:]')
          response=$(curl -sS -o /tmp/body -w '%{http_code}' \
            -H "Authorization: Bearer $KANDILLI_SECRET" \
            "$INGEST_URL")
          echo "HTTP $response"
          cat /tmp/body
          echo
          if [ "$response" != "200" ]; then
            exit 1
          fi
